<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Voice Trainer</title>

    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎓 English Voice Trainer</h1>
</header>

<!-- HOME SCREEN -->

<section id="homeScreen" class="screen active">

    <div class="card">

        <h2>Choose Card Set</h2>

        <select id="cardSetSelect"></select>

        <div class="button-group cardset-actions">
            <button id="exportCardsetBtn" class="secondary">📦 Export Cardset</button>
            <button id="importCardsetBtn" class="secondary">📤 Import Cardset</button>
            <button id="deleteCardsetBtn" class="danger">🗑 Delete Cardset</button>
            <input type="file" id="importCardsetFile" style="display: none;" accept=".json">
        </div>

    </div>

    <div class="card">

        <div class="progress-header">
    
            <h2>Your Progress</h2>
    
            <button
                id="analyticsBtn"
                class="analytics-btn">
    
                📊 Analytics
    
            </button>
    
        </div>
    
        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>
    
        <div id="progressText">
            0%
        </div>
    
        <div id="nextReviewBox">
            Next review:
            <span id="nextReviewTime">
                Ready now
            </span>
        </div>
    
    </div>

    <div class="actions">
    
        <button id="continueBtn">
            ▶ Continue Learning
        </button>
    
    </div>

</section>

<!-- LEARNING SCREEN -->

<section id="learnScreen" class="screen">

    <div class="top-bar">

        <button id="backHomeBtn">
            ← Home
        </button>

        <div id="learnProgress">
            0 / 0
        </div>

    </div>

    <div class="card learn-card">

        <div id="text">
            Loading...
        </div>

        <div id="cardStatus">
            New
        </div>

    </div>

    <div id="recognizedText">
        Press Start Listening
    </div>

    <div id="result">
    </div>

    <div class="actions">

        <button id="listenBtn">
            🎤 Start Listening
        </button>

        <button id="speakBtn">
            🔊 Repeat
        </button>

        <button id="nextBtn">
            ⏭ Skip
        </button>

    </div>

</section>

<!-- ANALYTICS SCREEN -->

<section id="analyticsScreen" class="screen">

    <div class="top-bar">

        <button id="analyticsBackBtn">
            ← Home
        </button>

        <h2>Analytics</h2>

    </div>

    <div class="card">

        <div class="stats-grid">

            <div class="stat">
                <div id="analyticsLearned">
                    0
                </div>
                <span>Learned</span>
            </div>

            <div class="stat">
                <div id="analyticsStage2">
                    0
                </div>
                <span>Repeat x2</span>
            </div>

            <div class="stat">
                <div id="analyticsStage1">
                    0
                </div>
                <span>Repeat x1</span>
            </div>

            <div class="stat">
                <div id="analyticsNew">
                    0
                </div>
                <span>New</span>
            </div>

        </div>

    </div>

    <div class="card">

        <table id="analyticsTable">

            <thead>
                <tr>
                    <th>Text</th>
                    <th>Status</th>
                    <th>Correct Answer</th>
                </tr>
            </thead>

            <tbody>
            </tbody>

        </table>

    </div>

    <div class="actions">

        <button
            id="resetBtn"
            class="danger">
    
            🔄 Reset Progress
    
        </button>

        <button
            id="setupProgressBtn"
            class="secondary">
    
            ⚙️ Setup Progress
    
        </button>
    
    </div>

</section>

<!-- PROGRESS SETUP MODAL -->

<div id="progressSetupModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Setup Progress</h2>
            <button id="closeProgressSetupBtn" class="close-btn">✕</button>
        </div>

        <div class="modal-body">

            <div class="setup-section">
                <h3>Bulk Operations</h3>
                <div class="button-group">
                    <button id="markAllNewBtn" class="secondary">Mark All as New</button>
                    <button id="markAllLearningBtn" class="secondary">Mark All as Learning</button>
                    <button id="markAllLearnedBtn" class="secondary">Mark All as Learned</button>
                </div>
            </div>

            <div class="setup-section">
                <h3>Individual Card Progress</h3>
                <input 
                    type="text" 
                    id="progressSearchInput" 
                    placeholder="Search cards..."
                    class="search-input">
                <div id="progressCardList" class="card-list">
                    <!-- Cards will be populated here -->
                </div>
            </div>

            <div class="setup-section">
                <h3>Import / Export</h3>
                <div class="button-group">
                    <button id="exportProgressBtn" class="secondary">📥 Export Progress</button>
                    <button id="importProgressBtn" class="secondary">📤 Import Progress</button>
                    <input type="file" id="importProgressFile" style="display: none;" accept=".json">
                </div>
            </div>

        </div>

        <div class="modal-footer">
            <button id="confirmSetupProgressBtn" class="primary">Done</button>
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
