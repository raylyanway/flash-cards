<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Flash Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎓 Voice Flash Cards</h1>

    <div id="progress">1 / 1</div>

    <div class="card">
        <div id="word">Loading...</div>
    </div>

    <div id="recognizedText">
        Press Start and say translation
    </div>

    <div id="result"></div>

    <div class="buttons">
        <button id="listenBtn">
            🎤 Start Listening
        </button>

        <button id="nextBtn">
            Next →
        </button>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
