<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Voice Trainer</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎓 English Voice Trainer</h1>
</header>

<!-- HOME SCREEN -->

<section id="homeScreen" class="screen active">

    <div class="card">

        <h2>Choose Card Set</h2>

        <select id="cardSetSelect">
            <option value="body-parts">Body Parts</option>
            <option value="animals">Animals</option>
            <option value="food">Food</option>
            <option value="medical">Medical</option>
        </select>

    </div>

    <div class="card">

        <div class="progress-header">
    
            <h2>Your Progress</h2>
    
            <button
                id="analyticsBtn"
                class="analytics-btn">
    
                📊 Analytics
    
            </button>
    
        </div>
    
        <div class="progress-bar">
            <div id="progressFill"></div>
        </div>
    
        <div id="progressText">
            0%
        </div>
    
        <div id="nextReviewBox">
            Next review:
            <span id="nextReviewTime">
                Ready now
            </span>
        </div>
    
    </div>

    <div class="actions">
    
        <button id="continueBtn">
            ▶ Continue Learning
        </button>
    
    </div>

</section>

<!-- LEARNING SCREEN -->

<section id="learnScreen" class="screen">

    <div class="top-bar">

        <button id="backHomeBtn">
            ← Home
        </button>

        <div id="learnProgress">
            0 / 0
        </div>

    </div>

    <div class="card learn-card">

        <div id="word">
            Loading...
        </div>

        <div id="cardStatus">
            New
        </div>

    </div>

    <div id="recognizedText">
        Press Start Listening
    </div>

    <div id="result">
    </div>

    <div class="actions">

        <button id="listenBtn">
            🎤 Start Listening
        </button>

        <button id="speakBtn">
            🔊 Repeat
        </button>

        <button id="nextBtn">
            ⏭ Skip
        </button>

    </div>

</section>

<!-- ANALYTICS SCREEN -->

<section id="analyticsScreen" class="screen">

    <div class="top-bar">

        <button id="analyticsBackBtn">
            ← Home
        </button>

        <h2>Analytics</h2>

    </div>

    <div class="card">

        <div class="stats-grid">

            <div class="stat">
                <div id="analyticsLearned">
                    0
                </div>
                <span>Learned</span>
            </div>

            <div class="stat">
                <div id="analyticsStage2">
                    0
                </div>
                <span>Repeat x2</span>
            </div>

            <div class="stat">
                <div id="analyticsStage1">
                    0
                </div>
                <span>Repeat x1</span>
            </div>

            <div class="stat">
                <div id="analyticsNew">
                    0
                </div>
                <span>New</span>
            </div>

        </div>

    </div>

    <div class="card">

        <table id="analyticsTable">

            <thead>
                <tr>
                    <th>Word</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>
            </tbody>

        </table>

    </div>

    <div class="actions">

        <button
            id="resetBtn"
            class="danger">
    
            🔄 Reset Progress
    
        </button>
    
    </div>

</section>

<script src="app.js"></script>

</body>
</html>
